# Tracks local shadows of gem-owned files, per docs/BOUNDARIES.md.
# Re-diff against upstream whenever the owning gem is bumped in the Gemfile.
overrides:
  - path: _includes/cv/render.liquid
    owner_gem: al_folio_cv
    owner_gem_version: "1.0.0"
    upstream_path: templates/cv/render.liquid
    upstream_sha256: 89c9ce23250ace91325d69ae0b8fab67ecc31466de1f09f91958c745e98a2324
    local_sha256: b007edeb102c5b61fdd75a5067a1ed35fffee326c1a8acf3f98f1a0e3624dada
    reason: >
      Render Experience and Volunteer as two separate cards instead of
      merging them into one; render Projects as a grid of individual cards
      instead of one shared list inside a single card; add a scoped CSS
      block that gives the date/location column a flex layout with matching
      date and location icons, keeping the badge and location text aligned
      and on a single line.

  - path: _includes/cv/projects.liquid
    owner_gem: al_folio_cv
    owner_gem_version: "1.0.0"
    upstream_path: templates/cv/projects.liquid
    upstream_sha256: 4a9a33b8b402d75e0afa9c966979f11274d95cff9f6e605642f8fd6e56e8922d
    local_sha256: ec1c91dcc3ef86a188ba58fa465c442330663bdc107b21e2d8cbb4c2106d27d2
    reason: >
      Render each project entry as its own card in a responsive grid
      instead of a single shared list-group.

  - path: _includes/cv/experience.liquid
    owner_gem: al_folio_cv
    owner_gem_version: "1.0.0"
    upstream_path: templates/cv/experience.liquid
    upstream_sha256: 35924ec994852bc967d9d3880927ec228037a17683231b3a83fc8e585ef5fe09
    local_sha256: 6d04a134544cd86c736a414a7adeb8475dd614240c132882fe4c0102bcb58a70
    reason: >
      Removed the entry.highlights bullet-list rendering block. This site's
      Experience data model no longer carries highlights: each entry now
      carries a single condensed 1-2 sentence summary instead of a bullet
      list, so only entry.summary renders below the position/company
      headers. Also widened the date/location column from 2/12 to 3/12
      columns, switched it from a <table> to a flex layout, and added a
      calendar icon next to the date badge to match the location icon.
