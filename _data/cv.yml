          - Achieved 0.68 ROC-AUC on training 7 neural and tree-based ML models including XGBoost and LightGBM
          - Implemented Shapley Additive Explanations and Counterfactual Explanations to enhance transparency

    Academic Projects:
      - name: "Marked System-2 Recommenders (CS 6103: Human Centred AI)"
        summary: Guide - Prof. Arpit Agarwal, Department of Computer Science and Engineering
        start_date: 2026-01
        end_date: 2026-05
        highlights:
          - Proposed a marked dual-kernel Hawkes process preserving identifiability beyond decay-rate collapse in recommenders
          - Derived identifiability and MLE consistency guarantees for marked temporal point processes with engagement signals
          - Developed a branching-EM inference framework, achieving 5.2x lower estimation error and 98% latent-state recovery

      - name: "Image Captioning for Remote Sensing (EE 782: Advanced Topics in Machine Learning)"
        summary: Guide - Prof. Amit Sethi, Department of Electrical Engineering
        start_date: 2025-08
        end_date: 2025-12
        highlights:
          - Developed 8 Transformer and LSTM based image captioning models and performed rigorous model evaluation
          - Fine-tuned ResNet-18 paired with LSTM and Transformer decoder on 10K+ satellite images from RSCID data
          - Performed qualitative analysis and evaluated results using BLEU and METEOR scores with attention map visualization
          - Compared MobileNet and ResNet-18 backbones across memory efficiency, inference speed and performance metrics

      - name: "Efficient Lightweight Skin Disease Prediction (DH302: Public Health Informatics)"
        summary: Guide - Prof. Saket Choudhary and Prof. Nirmal Punjabi, Koita Centre for Digital Health (KCDH)
        start_date: 2025-08
        end_date: 2025-12
        highlights:
          - Developed lightweight and quick-inference skin lesion classifiers for resource constrained environments
          - Conducted comprehensive literature review on efficient vision transformer architectures for medical image classification
          - Performed data harmonization by mapping BCN-20000 dermatology dataset labels to HAM-10000 taxonomy
          - Evaluated MobileViT and LOL-ViT architectures with modified attention mechanisms from Linformer and Nyströmformer

      - name: "Probabilistic Inference on FHMMs and Turbo Codes (CS 791: Probabilistic Foundations of AI)"
        summary: Guide - Prof. Sunita Sarawagi, Department of Computer Science and Engineering
        start_date: 2025-08
        end_date: 2025-12
        highlights:
          - Performed inference on Factorial Hidden Markov Models (FHMMs) and built decoders for noisy codes
          - Implemented exact inference for Factorial-HMMs by graph triangulation and using junction trees with message-passing
          - Developed Loopy Belief Propagation for FHMM marginals through iterative message passing on factor graphs
          - Built Viterbi, BCJR and Turbo decoders for noisy RSC codes, reducing BER to near-zero on 1000-bit sequences

      - name: "Voice and LLM based AI Room Guard (EE 782: Advanced Topics in Machine Learning)"
        summary: Guide - Prof. Amit Sethi, Department of Electrical Engineering
        start_date: 2025-08
        end_date: 2025-12
        highlights:
          - Built a robust face-detection pipeline using DeepFace, VGG-Face and Random Forest to guard a territory
          - Leveraged Gemini LLM to setup a 4-tier generative escalation warning system with gmail SMTP alerts
          - Implemented voice-command activation using speech recognition and gTTS for multi-modal interaction

      - name: "FPGA-based Resistive RAM Tester (EE 344: Electronic Design Lab)"
        summary: Guide - Prof. Veeresh Deshpande, Department of Electrical Engineering
        start_date: 2025-01
        end_date: 2025-05
        highlights:
          - Built an FPGA-based Resistive RAM tester integrating analog circuitry, FPGA logic, and a web-based user interface
          - Designed analog front-end circuits including DAC and ADC drivers, op-amps on a custom PCB based on published RRAM research, and verified functionality with FPGA-generated 500 ns pulses achieving 95% accuracy
          - Hosted web-interface on the Zynq-7000 processor of PYNQ-Z2, enabling real-time user-driven read/write operations

      - name: "Language Translation using Neural Machine Translation (CS 626: Natural Language Processing)"
        summary: Guide - Prof. Pushpak Bhattacharyya, Department of Computer Science and Engineering
        start_date: 2024-08
        end_date: 2024-12
        highlights:
          - Designed a language-to-language translation model based on Transformer encoder-decoder using Bahdanau attention
          - Implemented Transformer architecture from "Attention Is All You Need" in PyTorch for neural machine translation
          - Built Bahdanau attention in encoder-decoder framework to improve alignment in language-to-language translation
          - Developed a Seq2Seq machine translation pipeline in PyTorch to evaluate English-to-Hindi translation accuracy

      - name: "RISC Microprocessor Design (EE 309: Microprocessors)"
        summary: Guide - Prof. Virendra Singh, Department of Electrical Engineering
        start_date: 2024-01
        end_date: 2024-05
        highlights:
          - Designed a 16-bit RISC processor featuring a 6-stage pipeline architecture capable of executing 26 instructions
          - Implemented hazard mitigation techniques with forwarding, flushing, stalling and branch prediction
          - Simulated individual microprocessor components such as Instruction Memory, Pipeline Registers, Controller Boxes, Register File, ALU, MUXes, and Sign Extenders using VHDL on Intel Quartus software

      - name: "Practical Applications of Control Systems (EE 324: Control Systems Lab)"
        summary: Guide - Prof. Debraj Chakraborty, Department of Electrical Engineering
        start_date: 2024-08
        end_date: 2024-12
        highlights:
          - "Line Follower Bot: Devised a PID controller taking inputs from the infrared sensors to calculate the velocity"
          - "Inverted Pendulum: Implemented a Linear Quadratic Regulator controller on Arduino, which takes the current pendulum position as input and outputs the motor torque necessary to keep the pendulum upright"
          - "Noise Cancellation: Designed a second order filter circuit using Operational Amplifiers, resistors and capacitors, simulated on MATLAB, to filter out noise in a box by 20 decibels"

      - name: "Assembly & Embedded C with Intel 8051 (EE 337: Microprocessor Lab)"
        summary: Guide - Prof. Nikhil Karamchandani, Department of Electrical Engineering
        start_date: 2024-01
        end_date: 2024-05
        highlights:
          - Programmed 8051 based Pt-51 micro-controller using Assembly and Embedded C for embedded systems
          - Implemented keyboard interfacing using timers and external interrupts for stopwatch and musical notes
          - Integrated SPI to interface an analog-to-digital converter (ADC) MCP3008 with the 8051 micro-controller
          - Established serial communication with a USB-UART module and executed a low-pass digital FIR filter

      - name: "Digital Logic Design in VHDL (EE 214: Digital Circuits Lab)"
