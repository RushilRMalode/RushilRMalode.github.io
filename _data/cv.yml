    Research Experience:
      - company: Saket Lab, IIT Bombay
        position: Robust Embedding Selection for Canonical Data Mapping
        location: Koita Centre for Digital Health (KCDH)
        summary: Research project under Prof. Saket Choudhary
        start_date: 2025-01
        end_date: Present
        highlights:
          - Developed a framework to select embedding/decoder models for mapping corrupted text entries to canonical keys
          - Modeled embedding robustness by injecting directional Gaussian noise on the von Mises-Fisher (vMF) distribution
          - Engineered a dimension-scaled adjustment to standardize noise concentrations across embedding dimensions
          - Investigating theoretical guarantees on retrieval accuracy under the modeled embedding perturbations

      - company: Stochastic Systems Lab, IIT Bombay
        position: Best Arm Identification in Correlated Grouped Bandits
        location: Department of Electrical Engineering
        summary: Bachelor's Thesis Project under Prof. Sharayu Moharir
        start_date: 2025-08
        end_date: 2025-12
        highlights:
          - Developing a novel best-arm-identification algorithm to exploit reward correlation in Grouped Multi-Armed Bandits
          - Performed an extensive literature review including over 37 publications in the Multi-Armed Bandit domain
          - Generated 10M+ correlated rewards via parallelization using rpy2 and BINCOR to evaluate empirical correctness
          - Achieved 50% lower complexity compared to the existing Grouped Bandit on MovieLens and Goodreads datasets

      - company: MeDAL Lab, IIT Bombay
        position: Network Inversion on Convolutional Neural Networks
        location: Department of Electrical Engineering
        summary: Research project under Prof. Amit Sethi
        start_date: 2025-08
        end_date: 2025-12
        highlights:
          - Improved upon a novel generator-classifier architecture to reconstruct training-like data from pre-trained classifiers
          - "Reconstructed distinct training-like dataset samples for MNIST, FMNIST and CIFAR from classifiers trained on 10, 50 and 100 images, using classifier properties including gradient magnitudes, cross entropy and KL-divergence"
          - Worked towards improving reconstruction diversity and generalizing over standard neural network architectures

      - company: Max Planck Institute for Radio Astronomy
        position: CASI-3D U-Net for 13CO Bubble Prediction
        summary: Research project under Prof. Dario Colombo and Kartik Neralwar
        start_date: 2024-06
        end_date: 2024-08
        highlights:
          - Utilized CASI-3D U-Neural Net on processed data-cubes to detect 13CO stellar bubbles and validated their position
          - Conducted data exploration on SEDIGISM data for PPV cubes and identified velocity channels with signals
          - Post-processed pixel feedback probabilities by setting precise cutoffs for enhanced bubble-edge detection
          - Validated prediction positions to WISE Catalog of Galactic HII Region to ensure positional accuracy of predictions

      - company: TU Wien Informatics
        position: Streaming Model for Volume of Union of Convex Bodies
        summary: Research project under Dr. Sagar Malhotra
        start_date: 2024-06
        end_date: 2024-08
        highlights:
          - Ideated on an innovative randomized streaming algorithm for volume of union of convex bodies under space constraints
          - Performed in-depth analysis of the Karp-Luby-Madras (KLM) randomised approximation for union of sets
          - Understood KLM in Approximating Volume of Unions and Approximate Weighted Model Integration
          - Developed an algorithm for the setting by devising a novel density based sampling logic and extending the size estimation streaming algorithm from Estimating Size of the Union of Sets in Streaming Model for volumes

    Professional Experience:
      - company: ICICI Bank
        position: Interpretable Machine Learning for Credit Risk Scoring
        location: Risk Team
        summary: Internship project on credit risk scoring
        start_date: 2025-05
        end_date: 2025-07
